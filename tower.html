<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Fluid Dynamic | Render Only</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: #F0F2F5; 
            height: 600vh; /* 保持高度以触发滚动动画 */
            overflow-x: hidden;
        }
        #canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            z-index: 1; 
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];
    let scrollPos = 0;
    let targetScroll = 0;

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        particles = [];
        const count = 1500;

        for (let i = 0; i < count; i++) {
            let t = Math.random();
            let yRel = t * 0.75;
            let towerW = Math.pow(1 - yRel, 3.5) * 160 + 10;
            let xRel = (Math.random() - 0.5) * towerW;
            if (yRel < 0.2) xRel += (xRel > 0 ? 30 : -30) * (0.2 - yRel) * 5;

            particles.push({
                x: width / 2 + xRel,
                y: height * 0.85 - (yRel * height),
                baseX: width / 2 + (Math.random() - 0.5) * width * 0.8,
                baseY: height - Math.random() * 30,
                angle: Math.random() * Math.PI * 2,
                amplitude: Math.random() * 5 + 2, 
                speed: 0.02 + Math.random() * 0.03, 
                cpX: (Math.random() - 0.5) * 500, 
                size: Math.random() * 2 + 1,
                phase: Math.random() * 20 
            });
        }
    }

    function render() {
        targetScroll = window.scrollY / (document.body.scrollHeight - window.innerHeight);
        scrollPos += (targetScroll - scrollPos) * 0.1;

        ctx.clearRect(0, 0, width, height);
        
        particles.forEach(p => {
            let t = Math.max(0, Math.min(1, (scrollPos * 1.2) - (p.phase * 0.02)));
            
            // 贝塞尔轨迹计算
            let q1x = p.x + p.cpX * t;
            let q1y = p.y - 100 * t; 
            
            let currentX = Math.pow(1-t, 2) * p.x + 2 * (1-t) * t * q1x + Math.pow(t, 2) * p.baseX;
            let currentY = Math.pow(1-t, 2) * p.y + 2 * (1-t) * t * q1y + Math.pow(t, 2) * p.baseY;

            // 简谐呼吸感
            p.angle += p.speed;
            let oscX = Math.cos(p.angle) * p.amplitude * (1 - t * 0.8);
            let oscY = Math.sin(p.angle) * p.amplitude * (1 - t * 0.8);

            ctx.fillStyle = '#A0AEC0';
            ctx.beginPath();
            ctx.arc(currentX + oscX, currentY + oscY, p.size, 0, Math.PI * 2);
            ctx.fill();
        });

        requestAnimationFrame(render);
    }

    window.addEventListener('resize', init);
    init();
    render();
</script>
</body>
</html>
